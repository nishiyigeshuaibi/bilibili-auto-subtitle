<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, "Microsoft YaHei", sans-serif;
      background: #fff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
    }
    /* 开关样式 */
    .switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      transition: background 0.25s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }
    .switch input:checked + .slider {
      background: #00a1d6;
    }
    .switch input:checked + .slider::before {
      transform: translateX(20px);
    }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="title">自动开启字幕</span>
    <label class="switch">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status">已开启</div>
  <script src="popup.js"></script>
</body>
</html>
